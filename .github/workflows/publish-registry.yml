name: Publish To Comfy Registry

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.repository == 'beiyue0208ly/tunan-paint-bridge-nodes'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate Registry Secret
        env:
          REGISTRY_ACCESS_TOKEN: ${{ secrets.REGISTRY_ACCESS_TOKEN }}
        run: |
          if [ -z "$REGISTRY_ACCESS_TOKEN" ]; then
            echo "REGISTRY_ACCESS_TOKEN is not configured. Add it in GitHub Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Set Up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install Comfy CLI
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install comfy-cli

      - name: Publish Node
        shell: bash
        env:
          REGISTRY_ACCESS_TOKEN: ${{ secrets.REGISTRY_ACCESS_TOKEN }}
        run: |
          comfy --skip-prompt --no-enable-telemetry env
          comfy node publish --token "$REGISTRY_ACCESS_TOKEN"
