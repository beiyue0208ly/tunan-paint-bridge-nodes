name: Publish To Comfy Registry

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.repository == 'beiyue0208ly/tunan-paint-bridge-nodes'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Comfy CLI
        run: pip install comfy-cli

      - name: Validate Registry Secret
        env:
          COMFY_API_KEY: ${{ secrets.COMFY_API_KEY }}
        run: |
          if [ -z "$COMFY_API_KEY" ]; then
            echo "COMFY_API_KEY is not configured. Add it in GitHub Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Publish Node
        env:
          COMFY_API_KEY: ${{ secrets.COMFY_API_KEY }}
        run: comfy node publish
