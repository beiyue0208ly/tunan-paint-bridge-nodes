name: Publish To Comfy Registry

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "pyproject.toml"
      - "requirements.txt"
      - "install.py"
      - "__init__.py"
      - "backend/**"
      - "web/**"
      - "assets/**"

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.repository == 'beiyue0208ly/tunan-paint-bridge-nodes'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Comfy CLI
        run: pip install comfy-cli

      - name: Publish Node
        env:
          COMFY_API_KEY: ${{ secrets.COMFY_API_KEY }}
        run: comfy node publish
