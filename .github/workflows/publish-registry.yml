name: Publish To Comfy Registry

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.repository == 'beiyue0208ly/tunan-paint-bridge-nodes'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate Registry Secret
        env:
          REGISTRY_ACCESS_TOKEN: ${{ secrets.REGISTRY_ACCESS_TOKEN }}
        run: |
          if [ -z "$REGISTRY_ACCESS_TOKEN" ]; then
            echo "REGISTRY_ACCESS_TOKEN is not configured. Add it in GitHub Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Publish Node
        uses: Comfy-Org/publish-node-action@main
        with:
          personal_access_token: ${{ secrets.REGISTRY_ACCESS_TOKEN }}
